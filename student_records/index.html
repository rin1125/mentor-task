<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { padding: 20px; background-color: #f8f9fa; }
    .container { max-width: 600px; background: white; padding: 30px; border-radius: 10px; }
    .form-label { font-weight: bold; margin-bottom: 0.2rem; }
    .form-text { color: #6c757d; margin-bottom: 1.2rem; font-size: 0.85rem; }
    .search-guide { font-size: 0.75rem; color: #0d6efd; margin-top: -0.5rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="container shadow-sm">
    <h3 class="mb-4 text-primary">生徒対応履歴フォーム</h3>
    <form id="recordForm">
      
      <div class="mb-3">
        <label class="form-label">メンター名</label>
        <input type="text" name="mentorName" class="form-control" placeholder="例：山田 太郎" required>
      </div>

      <div class="row">
        <div class="col-md-5 mb-3">
          <label class="form-label">学年</label>
          <select id="gradeSelect" name="studentGrade" class="form-select" onchange="updateStudentList()" required>
            <option value="">読込中...</option>
          </select>
        </div>
        
        <div class="col-md-7 mb-3">
          <label class="form-label">生徒名</label>
          <input type="text" id="studentInput" name="studentName" class="form-control" list="studentList" placeholder="名前を入力して検索(先に学年を入力)" required>
          <datalist id="studentList"></datalist>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">教科</label>
        <select name="subject" class="form-select" required>
          <option value="">選択してください</option>
          <option value="英語">英語</option><option value="数学">数学</option><option value="国語">国語</option>
          <option value="物理">物理</option><option value="化学">化学</option><option value="生物">生物</option>
          <option value="地学">地学</option><option value="地理">地理</option><option value="日本史">日本史</option>
          <option value="世界史">世界史</option><option value="公民">公民</option><option value="情報">情報</option>
          <option value="進路相談">進路相談</option>
          <option value="その他">その他</option>
        </select>
      </div>

      <div class="mb-1">
        <label class="form-label">指導内容</label>
        <textarea name="instruction" class="form-control" rows="3" placeholder="例：数学Ⅱの微分の最大最小について質問。解法を説明した後、途中式の整理の仕方を確認。類題を1問一緒に解き、同じ手順で解けるかを確認した。大学の授業と高校内容とのつながりを話した。" required></textarea>
      </div>
      <div class="form-text">生徒から受けた質問・相談の内容と、それに対して行った説明・アドバイス・指導内容を記入してください。</div>

      <div class="mb-1">
        <label class="form-label">定性情報（生徒の様子）</label>
        <textarea name="qualitativeInfo" class="form-control" rows="3" placeholder="例：バドミントン部。部活後に友人と来室することが多いが、勉強自体は黙々と取り組むタイプ。経済系の分野に興味があると話していた。"></textarea>
      </div>
      <div class="form-text">生徒の性格や勉強への取り組み方、興味関心など、生徒さんとのやりとりの中で感じられた特徴を記入してください。</div>

      <button type="submit" class="btn btn-primary w-100 mt-2">この内容で送信する</button>
    </form>
    <div id="msg" class="mt-3 text-center fw-bold text-success"></div>
  </div>

  <script>
    let masterData = {};

    window.onload = () => {
      google.script.run.withSuccessHandler(data => {
        masterData = data;
        const gradeSelect = document.getElementById('gradeSelect');
        gradeSelect.innerHTML = '<option value="">選択してください</option>';
        
        const sortedGrades = Object.keys(data).sort((a, b) => {
          const priority = (s) => s.includes('中') ? 1 : (s.includes('高') ? 2 : 3);
          if (priority(a) !== priority(b)) return priority(a) - priority(b);
          return (parseInt(a.replace(/[^0-9]/g, '')) || 0) - (parseInt(b.replace(/[^0-9]/g, '')) || 0);
        });

        sortedGrades.forEach(grade => {
          const opt = document.createElement('option');
          opt.value = grade;
          opt.innerHTML = grade;
          gradeSelect.appendChild(opt);
        });
      }).getStudentData();
    };

    // 学年が選ばれたら検索候補（datalist）を更新
    function updateStudentList() {
      const grade = document.getElementById('gradeSelect').value;
      const dataList = document.getElementById('studentList');
      const studentInput = document.getElementById('studentInput');
      
      dataList.innerHTML = '';
      studentInput.value = ''; // 学年を変えたら一旦リセット
      
      if (masterData[grade]) {
        masterData[grade].forEach(name => {
          const option = document.createElement('option');
          option.value = name;
          dataList.appendChild(option);
        });
      }
    }

    document.getElementById('recordForm').onsubmit = function(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.disabled = true;
      btn.innerHTML = "送信中...";
      google.script.run.withSuccessHandler(msg => {
        document.getElementById('msg').innerHTML = msg;
        e.target.reset();
        btn.disabled = false;
        btn.innerHTML = "この内容で送信する";
      }).processForm(this);
    };
  </script>
</body>
</html>
